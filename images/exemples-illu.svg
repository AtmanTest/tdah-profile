<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2e2a1e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b5b8c" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#2a2a4e" stop-opacity=".05"/>
    </linearGradient>
    <filter id="sg">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg2)"/>
  <!-- Calendar -->
  <rect x="30" y="30" width="65" height="75" rx="6" fill="none" stroke="#5a7fba" stroke-width="1.5" opacity=".6"/>
  <rect x="30" y="42" width="65" height="16" rx="3" fill="#3b5b8c" opacity=".2"/>
  <text x="62" y="55" text-anchor="middle" fill="#5a7fba" font-size="6" opacity=".6">MAR</text>
  <text x="62" y="85" text-anchor="middle" fill="#8b7bff" font-size="18" font-weight="bold" opacity=".5">24</text>
  <line x1="30" y1="90" x2="95" y2="90" stroke="#5a7fba" stroke-width=".5" opacity=".2"/>
  <line x1="30" y1="96" x2="80" y2="96" stroke="#8b7bff" stroke-width=".5" opacity=".2"/>
  <!-- X mark on calendar -->
  <line x1="65" y1="55" x2="80" y2="70" stroke="#ff6b6b" stroke-width="2" opacity=".5"/>
  <line x1="80" y1="55" x2="65" y2="70" stroke="#ff6b6b" stroke-width="2" opacity=".5"/>
  <!-- Keys -->
  <g transform="translate(220,40) rotate(-25)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#6b8b4e" stroke-width="1.5" opacity=".5"/>
    <line x1="8" y1="0" x2="45" y2="0" stroke="#6b8b4e" stroke-width="1.5" opacity=".5"/>
    <line x1="15" y1="0" x2="15" y2="-4" stroke="#6b8b4e" stroke-width="1" opacity=".3"/>
    <line x1="22" y1="0" x2="22" y2="-3" stroke="#6b8b4e" stroke-width="1" opacity=".3"/>
    <line x1="29" y1="0" x2="29" y2="-5" stroke="#6b8b4e" stroke-width="1" opacity=".3"/>
  </g>
  <!-- Phone -->
  <rect x="280" y="70" width="50" height="85" rx="8" fill="none" stroke="#7b6bff" stroke-width="1.5" opacity=".5" transform="rotate(15, 305, 112)"/>
  <rect x="290" y="80" width="30" height="50" rx="4" fill="#7b6bff" opacity=".08" transform="rotate(15, 305, 112)"/>
  <!-- Coffee mug -->
  <g transform="translate(100,160)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="none" stroke="#a08050" stroke-width="1.5" opacity=".4"/>
    <path d="M40 8 C52 8 52 22 52 28 C52 34 48 38 40 36" fill="none" stroke="#a08050" stroke-width="1.5" opacity=".4"/>
    <ellipse cx="20" cy="5" rx="14" ry="4" fill="#a08050" opacity=".15"/>
  </g>
  <!-- Envelope -->
  <g transform="translate(220,170)">
    <rect x="0" y="0" width="55" height="35" rx="4" fill="none" stroke="#8b7bff" stroke-width="1.5" opacity=".4"/>
    <polyline points="0,0 27,15 55,0" fill="none" stroke="#8b7bff" stroke-width="1.5" opacity=".4"/>
  </g>
  <!-- Loose change -->
  <circle cx="300" cy="230" r="8" fill="none" stroke="#d4a030" stroke-width="1.5" opacity=".35"/>
  <circle cx="315" cy="225" r="7" fill="none" stroke="#c09020" stroke-width="1.5" opacity=".3"/>
  <circle cx="325" cy="235" r="6" fill="none" stroke="#b09030" stroke-width="1.5" opacity=".25"/>
  <!-- Scattered dots -->
  <circle cx="50" cy="200" r="2" fill="#5a7fba" opacity=".2"/>
  <circle cx="350" cy="50" r="2" fill="#8b7bff" opacity=".2"/>
  <circle cx="370" cy="180" r="1.5" fill="#6b8b4e" opacity=".2"/>
  <circle cx="40" cy="250" r="1.5" fill="#7b6bff" opacity=".2"/>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" fill="#5a7fba" font-size="9" font-family="Inter,sans-serif" opacity=".5">Oublis quotidiens · Dispersion</text>
</svg>