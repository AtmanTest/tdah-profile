<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2a1a4e"/>
    </linearGradient>
    <linearGradient id="fog1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b5bff" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#3b5b8c" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="fog2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7bff" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#5b7b9c" stop-opacity=".1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg1)"/>
  <!-- Head silhouette -->
  <path d="M200 30 C160 30 130 55 125 90 C120 120 130 145 150 160 L145 210 C145 220 155 225 165 220 L185 210 L190 260 C190 268 198 272 200 272 C202 272 210 268 210 260 L215 210 L235 220 C245 225 255 220 255 210 L250 160 C270 145 280 120 275 90 C270 55 240 30 200 30Z" fill="#2a2a5e" stroke="#5a7fba" stroke-width="1.5" opacity=".8"/>
  <!-- Brain lines inside -->
  <path d="M170 70 C175 65 185 65 190 72" stroke="#6b5bff" stroke-width="1.5" opacity=".4" filter="url(#glow)"/>
  <path d="M195 68 C200 60 210 62 215 70" stroke="#7b6bff" stroke-width="1.5" opacity=".3" filter="url(#glow)"/>
  <path d="M180 85 C178 80 182 75 190 80" stroke="#8b7bff" stroke-width="1" opacity=".3"/>
  <path d="M210 82 C215 78 220 80 218 88" stroke="#8b7bff" stroke-width="1" opacity=".3"/>
  <!-- Fog/cloud swirls -->
  <ellipse cx="170" cy="110" rx="35" ry="18" fill="url(#fog1)" filter="url(#glow)"/>
  <ellipse cx="220" cy="100" rx="30" ry="15" fill="url(#fog2)" filter="url(#glow)"/>
  <ellipse cx="195" cy="130" rx="40" ry="20" fill="url(#fog1)" filter="url(#glow)"/>
  <ellipse cx="230" cy="120" rx="25" ry="12" fill="url(#fog2)" filter="url(#glow)"/>
  <ellipse cx="165" cy="135" rx="20" ry="10" fill="url(#fog2)" filter="url(#glow)"/>
  <!-- Small dot particles -->
  <circle cx="160" cy="95" r="2" fill="#6b5bff" opacity=".4"/>
  <circle cx="230" cy="90" r="1.5" fill="#8b7bff" opacity=".3"/>
  <circle cx="175" cy="140" r="1.5" fill="#7b6bff" opacity=".35"/>
  <circle cx="215" cy="145" r="2" fill="#6b5bff" opacity=".3"/>
  <circle cx="190" cy="85" r="1" fill="#9b8bff" opacity=".4"/>
  <circle cx="240" cy="110" r="1.5" fill="#6b5bff" opacity=".25"/>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" fill="#5a7fba" font-size="9" font-family="Inter,sans-serif" opacity=".5">Brouillard mental · Pensées en parallèle</text>
</svg>